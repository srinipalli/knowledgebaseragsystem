services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm_pipeline_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: llm_pipeline_app
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    depends_on:
      - postgres
    command: ["llm-pipeline", "watch-folder"]

volumes:
  postgres_data:
